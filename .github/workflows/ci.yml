name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    # Tests only make sense on pull requests, not on push-to-main runs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest voluptuous

      - name: Run tests
        run: python -m pytest tests/ -v

  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: HACS Action
        uses: hacs/action@22.5.0
        with:
          category: integration

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Hassfest
        uses: home-assistant/actions/hassfest@master
