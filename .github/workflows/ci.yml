name: CI

on:
  pull_request:
    types: [opened, edited, synchronize]
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v

  sync-changelog:
    name: Sync changelog from PR body
    # Skip on forks — they cannot push back to this repo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Update [Unreleased] block from PR body
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: python3 .github/scripts/sync_changelog.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet CHANGELOG.md || (
            git add CHANGELOG.md &&
            git commit -m "docs: sync changelog from PR #${{ github.event.pull_request.number }}" &&
            git push
          )
