name: Release

on:
  # Automatic: runs whenever a PR is merged into main.
  # Label the PR with "bump:minor" or "bump:major" to control the version bump.
  # No label (or any other label) defaults to a patch bump.
  pull_request:
    types: [closed]
    branches: [main]

  # Manual escape hatch: choose the bump type explicitly.
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

jobs:
  release:
    # For the automatic trigger, only run when the PR was actually merged.
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump type
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "type=${{ github.event.inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            LABELS='${{ toJson(github.event.pull_request.labels.*.name) }}'
            if echo "$LABELS" | grep -q '"bump:major"'; then
              echo "type=major" >> "$GITHUB_OUTPUT"
            elif echo "$LABELS" | grep -q '"bump:minor"'; then
              echo "type=minor" >> "$GITHUB_OUTPUT"
            else
              echo "type=patch" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(jq -r '.version' custom_components/clockify_overtime/manifest.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "version=$MAJOR.$MINOR.$PATCH" >> "$GITHUB_OUTPUT"

      - name: Append PR reference to changelog items
        if: github.event_name != 'workflow_dispatch'
        run: |
          PR_NUM="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          awk -v pr="#${PR_NUM}" -v url="${PR_URL}" '
            /^## \[Unreleased\]/       { in_block=1 }
            /^## \[/ && !/Unreleased/  { in_block=0 }
            in_block && /^- / { sub(/[[:space:]]*$/, ""); print $0 " (" pr " " url ")"; next }
            { print }
          ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md

      - name: Bump version in manifest.json
        run: |
          sed -i 's/"version": "[^"]*"/"version": "${{ steps.version.outputs.version }}"/' \
            custom_components/clockify_overtime/manifest.json

      - name: Update CHANGELOG.md
        run: |
          TODAY=$(date +%Y-%m-%d)
          VERSION=${{ steps.version.outputs.version }}
          sed -i "s/## \[Unreleased\]/## [Unreleased]\n\n## [$VERSION] - $TODAY/" CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/clockify_overtime/manifest.json CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }}"
          git tag v${{ steps.version.outputs.version }}
          git push && git push --tags

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="## [$VERSION] -" '
            substr($0, 1, length(ver)) == ver { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file -
