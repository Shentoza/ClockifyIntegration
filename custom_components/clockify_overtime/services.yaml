adjust_correction_hours:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: clockify_overtime
    hours:
      required: true
      selector:
        number:
          min: -9999
          max: 9999
          step: 0.25
          unit_of_measurement: h

reset_correction_hours:
  fields:
    config_entry_id:
      required: true
      selector:
        config_entry:
          integration: clockify_overtime
